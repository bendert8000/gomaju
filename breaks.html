<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomaju — Break rules</title>
    <script type="module" src="/src/breaks.ts" defer></script>
  </head>
  <body class="settings-page">
    <header class="settings-header">
      <h1 data-i18n="rules.heading">Today's breaks</h1>
    </header>

    <main class="settings-main">
      <div id="rules" class="rule-deck"></div>
    </main>

    <footer class="settings-footer">
      <span id="msg" class="muted"></span>
      <div class="actions">
        <button id="settings-btn" type="button" class="btn-ghost" data-i18n="rules.edit_in_settings">Edit in Settings…</button>
        <button id="close-btn" type="button" class="btn-primary" data-i18n="common.close">Close</button>
      </div>
    </footer>
  </body>
</html>
