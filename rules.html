<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>restee — Break rules</title>
    <script type="module" src="/src/rules.ts" defer></script>
  </head>
  <body class="settings-page">
    <header class="settings-header">
      <h1>Today's breaks</h1>
    </header>

    <main class="settings-main">
      <p class="muted">
        Tap a card to switch a break on or off for today. To change names or timings, edit
        the details in Settings.
      </p>
      <div id="rules" class="rule-deck"></div>
    </main>

    <footer class="settings-footer">
      <span id="msg" class="muted"></span>
      <div class="actions">
        <button id="settings-btn" type="button" class="btn-ghost">Edit in Settings…</button>
        <button id="close-btn" type="button" class="btn-primary">Close</button>
      </div>
    </footer>
  </body>
</html>
