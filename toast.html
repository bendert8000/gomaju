<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomaju</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="toast toast--countdown">
    <img class="toast__mascot" src="/eyeman-3.png" alt="" aria-hidden="true" draggable="false" />
    <div class="toast__row">
      <span class="toast__dot"></span>
      <div class="toast__text">
        <div class="brand-tag">Gomaju</div>
        <div class="toast__title" id="toast-title">Break soon</div>
        <div class="toast__sub" id="toast-sub">starting in 0:30</div>
      </div>
      <div class="toast__actions">
        <button class="toast__delay toast__delay--go" id="toast-break-now" type="button">
          Break now
        </button>
        <button class="toast__delay" id="toast-delay" type="button">Delay 1 min</button>
      </div>
    </div>
    <div class="toast__bar"><div class="toast__bar-fill" id="toast-bar"></div></div>
    <script type="module" src="/src/toast.ts"></script>
  </body>
</html>
