<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gomaju</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="toast toast--confirm">
    <div class="toast__row">
      <span class="toast__dot"></span>
      <div class="toast__text">
        <div class="brand-tag">Gomaju</div>
        <div class="toast__title" id="confirm-title"></div>
        <div class="toast__sub" id="confirm-message"></div>
      </div>
    </div>
    <div class="toast__actions">
      <button class="toast__delay" id="confirm-secondary" type="button"></button>
      <button class="toast__delay toast__delay--primary" id="confirm-primary" type="button"></button>
    </div>
    <script type="module" src="/src/confirm.ts"></script>
  </body>
</html>
